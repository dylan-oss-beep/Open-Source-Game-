<!DOCTYPE html>
<html>
<head>
  <title>Tiny Jumper</title>
  <style>
    body { margin: 0; background: #222; }
    canvas { display: block; margin: auto; background: #333; }
  </style>
</head>
<body>
<canvas id="game" width="600" height="400"></canvas>

<script>
// Canvas setup
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player
let player = {
  x: 50,
  y: 300,
  w: 30,
  h: 30,
  xSpeed: 0,
  ySpeed: 0,
  onGround: false
};

// Controls
let left = false, right = false, jump = false;
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") left = true;
  if (e.key === "ArrowRight") right = true;
  if (e.key === " " || e.key === "ArrowUp") jump = true;
});
document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft") left = false;
  if (e.key === "ArrowRight") right = false;
  if (e.key === " " || e.key === "ArrowUp") jump = false;
});

// Platforms
const platforms = [
  { x: 0,   y: 350, w: 600, h: 50 },
  { x: 150, y: 280, w: 120, h: 20 },
  { x: 320, y: 220, w: 120, h: 20 },
  { x: 480, y: 160, w: 100, h: 20 }
];

// Goal
const goal = { x: 520, y: 120, w: 40, h: 40 };

// Physics
const gravity = 0.5;
const moveSpeed = 3;
const jumpPower = -10;

function update() {
  // Horizontal movement
  if (left) player.xSpeed = -moveSpeed;
  else if (right) player.xSpeed = moveSpeed;
  else player.xSpeed = 0;

  // Jump
  if (jump && player.onGround) {
    player.ySpeed = jumpPower;
    player.onGround = false;
  }

  // Apply gravity
  player.ySpeed += gravity;

  // Move player
  player.x += player.xSpeed;
  player.y += player.ySpeed;

  // Collision with platforms
  player.onGround = false;
  for (let p of platforms) {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y < p.y + p.h &&
      player.y + player.h > p.y
    ) {
      // Land on top
      if (player.ySpeed > 0) {
        player.y = p.y - player.h;
        player.ySpeed = 0;
        player.onGround = true;
      }
    }
  }

  // Win condition
  if (
    player.x < goal.x + goal.w &&
    player.x + player.w > goal.x &&
    player.y < goal.y + goal.h &&
    player.y + player.h > goal.y
  ) {
    alert("You win!");
    document.location.reload();
  }

  // Keep player inside screen
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if (player.y > canvas.height) {
    alert("You fell! Try again.");
    document.location.reload();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Platforms
  ctx.fillStyle = "white";
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // Goal
  ctx.fillStyle = "yellow";
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
